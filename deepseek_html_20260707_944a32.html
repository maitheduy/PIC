<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trình chiếu ảnh</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
    }

    .slide-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .slide {
      width: 100%;
      height: 100%;
      display: none;
    }

    .slide.active {
      display: block;
    }

    .slide img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      display: block;
    }

    /* Nút điều hướng siêu nhỏ */
    .nav-btn {
      position: fixed;
      bottom: 20px;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      border-radius: 50%;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.3s ease;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      user-select: none;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.5);
      color: rgba(0,0,0,0.7);
      border-color: rgba(255,255,255,0.6);
      transform: scale(1.15);
    }

    #prev {
      left: 20px;
    }

    #next {
      right: 20px;
    }

    /* Tùy chọn: thêm số slide cực nhỏ (nếu cần) */
    .slide-counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      font-family: Arial, sans-serif;
      letter-spacing: 1px;
      z-index: 998;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <!-- SLIDE 1 -->
    <div class="slide active">
      <img src="https://picsum.photos/1920/1080?random=1" alt="Ảnh 1">
    </div>

    <!-- SLIDE 2 -->
    <div class="slide">
      <img src="https://picsum.photos/1920/1080?random=2" alt="Ảnh 2">
    </div>

    <!-- SLIDE 3 -->
    <div class="slide">
      <img src="https://picsum.photos/1920/1080?random=3" alt="Ảnh 3">
    </div>

    <!-- SLIDE 4 -->
    <div class="slide">
      <img src="https://picsum.photos/1920/1080?random=4" alt="Ảnh 4">
    </div>

    <!-- Nút điều hướng -->
    <button class="nav-btn" id="prev">◀</button>
    <button class="nav-btn" id="next">▶</button>

    <!-- Số slide (tùy chọn, không bắt buộc) -->
    <div class="slide-counter" id="counter">1 / 4</div>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const counter = document.getElementById('counter');
    let current = 0;
    const total = slides.length;

    function goTo(index) {
      slides.forEach(s => s.classList.remove('active'));
      slides[index].classList.add('active');
      if (counter) {
        counter.textContent = `${index + 1} / ${total}`;
      }
    }

    function nextSlide() {
      current = (current + 1) % total;
      goTo(current);
    }

    function prevSlide() {
      current = (current - 1 + total) % total;
      goTo(current);
    }

    nextBtn.addEventListener('click', nextSlide);
    prevBtn.addEventListener('click', prevSlide);

    // Phím tắt: mũi tên trái/phải
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
    });

    // Tự động chạy (tùy chọn)
    // setInterval(nextSlide, 5000);
  </script>
</body>
</html>
